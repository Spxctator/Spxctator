}

;Change color of glow
modify:
{
	match:
	{
		"targetname" "Boss_HP_Counter"
	}
	insert:
	{
		"OutValue" "Spx_Color_CaseInValue0-1"
		"OnHitMax" "Guardian_1SetGlowDisabled0-1"
	}
}

