;Stripper by Spxctator
;Work around for boss attacks to appear in chat and hud

add:
{
	"origin" "100 100 100"
	"y" "0.2"
	"x" "0.2"
	"targetname" "spx"
	"spawnflags" "1"
	"holdtime" "4"
	"fxtime" "0.25"
	"fadeout" "1"
	"fadein" "0.1"
	"effect" "0"
	"color2" "0 255 255"
	"color" "255 0 0"
	"channel" "3"
	"classname" "game_text"
}

modify:
{
	match:
	{
		"targetname" "holy_relay"
		"classname" "logic_relay"
	}
	insert:
	{
		"OnTrigger" "commandCommandsay *** HOLY ***0.01-1"
		"OnTrigger" "spxSetText< HOLY >0-1"
		"OnTrigger" "spxDisplay0.01-1"
	}
}

